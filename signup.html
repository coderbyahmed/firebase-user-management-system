<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Firebase User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-bg">
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
    <div class="glow-orb glow-orb--3"></div>
    <div class="glow-orb glow-orb--4"></div>
    <div class="glow-orb glow-orb--5"></div>

    <div class="glass-card">
      <div class="flex flex-col items-center mb-7">
        <div class="auth-logo">
          <i class="fas fa-user-plus"></i>
        </div>
        <h2>Create account</h2>
        <p class="subtitle">Sign up to get started with the system</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div id="emailError" class="validation-error hidden"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Create a password" required autocomplete="new-password">
            <button type="button" id="togglePassword" class="password-toggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div id="passwordError" class="validation-error hidden"></div>
          <div id="passwordHint" class="mt-1 text-xs text-gray-400">
            <i class="far fa-circle mr-1"></i> Must be at least 8 characters
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <div class="input-wrapper">
            <i class="fas fa-check-circle input-icon"></i>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required autocomplete="new-password">
          </div>
          <div id="confirmError" class="validation-error hidden"></div>
        </div>

        <button type="submit" id="signupBtn" class="btn-primary">
          <span id="btnText">Create Account</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>

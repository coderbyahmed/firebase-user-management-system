<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Firebase User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-bg">
    <div class="bubble-1"></div>
    <div class="bubble-2"></div>
    <div class="bubble-3"></div>

    <div class="glass-card">
      <div class="text-center mb-6">
        <div class="auth-logo">
          <i class="fas fa-key"></i>
        </div>
        <h2>Forgot password?</h2>
        <p class="subtitle">Enter your email and we'll send you a reset link</p>
      </div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <button type="submit" id="resetBtn" class="btn-primary">
          <span id="btnText">Send Reset Link</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-link">
        <a href="index.html"><i class="fas fa-arrow-left mr-1"></i> Back to sign in</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/forgotPassword.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Firebase User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard-bg">
    <header class="dashboard-header">
      <div class="header-content">
        <h1>
          <i class="fas fa-fire"></i>
          Firebase User Management
        </h1>
        <div class="header-right">
          <span class="user-email"><i class="fas fa-user-circle"></i> <span id="displayEmail">user@email.com</span></span>
          <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(124, 58, 237, 0.08); color: #7c3aed;">
            <i class="fas fa-users"></i>
          </div>
          <div class="stat-number" id="totalUsers">0</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(16, 185, 129, 0.08); color: #10b981;">
            <i class="fas fa-user-check"></i>
          </div>
          <div class="stat-number" id="activeUsers">0</div>
          <div class="stat-label">Active Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(245, 158, 11, 0.08); color: #f59e0b;">
            <i class="fas fa-city"></i>
          </div>
          <div class="stat-number" id="totalCities">0</div>
          <div class="stat-label">Cities</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: rgba(59, 130, 246, 0.08); color: #3b82f6;">
            <i class="fas fa-briefcase"></i>
          </div>
          <div class="stat-number" id="totalProfessions">0</div>
          <div class="stat-label">Professions</div>
        </div>
      </div>

      <div class="form-card">
        <h3><i class="fas fa-user-plus"></i> User Information</h3>
        <form id="userForm">
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="age">Age</label>
              <input type="number" id="age" class="form-control" placeholder="25" min="1" max="150" required>
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" class="form-control" placeholder="New York" required>
            </div>
            <div class="form-group">
              <label for="profession">Profession</label>
              <input type="text" id="profession" class="form-control" placeholder="Software Engineer" required>
            </div>
          </div>
          <input type="hidden" id="editUserId" value="">
          <div class="form-actions">
            <button type="submit" id="addBtn" class="btn-add"><i class="fas fa-plus"></i> Add User</button>
            <button type="button" id="updateBtn" class="btn-update" style="display:none;"><i class="fas fa-save"></i> Update User</button>
            <button type="button" id="resetBtn" class="btn-reset"><i class="fas fa-undo"></i> Reset Form</button>
          </div>
        </form>
      </div>

      <div class="table-card">
        <h3><i class="fas fa-table"></i> All Users</h3>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>City</th>
                <th>Profession</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="7">
                  <div class="empty-state">
                    <i class="fas fa-users-slash"></i>
                    <h4>No Users Found</h4>
                    <p>Add your first user using the form above.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="viewModal">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h3><i class="fas fa-user-circle"></i> User Details</h3>
      <div id="userDetailsContainer"></div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>

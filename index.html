<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Firebase User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js"
    }
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-bg">
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>
    <div class="glow-orb glow-orb--3"></div>
    <div class="glow-orb glow-orb--4"></div>
    <div class="glow-orb glow-orb--5"></div>

    <div class="glass-card">
      <div class="flex flex-col items-center mb-7">
        <div class="auth-logo">
          <i class="fas fa-lock"></i>
        </div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" id="togglePassword" class="password-toggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn" class="btn-primary">
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="spinner" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="signup.html">Create account</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
